name: MM Tools

# Three independent jobs on three schedules, per the directive:
#   layer6-batch:          weekdays 22:30 UTC — mm_tools.py layer6 for the
#                           top scanner_digest.json setups -> data/layer6_digest.json
#                           (5 min after Scanner's 22:25 UTC run, so it reads
#                           TODAY's setups instead of yesterday's)
#   deployment-ladder:      Mondays 21:15 UTC (weekly) -> data/deployment_ladder_digest.json
#   fomc-calendar-refresh:  January 5, 14:00 UTC (annual) — re-scrapes the
#                           Fed's own FOMC calendar into
#                           scripts/deployment_ladder_config.json's
#                           fomc_dates, removing the manual-update
#                           dependency. Fails loud (non-zero exit, config
#                           untouched) on any parse anomaly rather than
#                           fail-soft -- see fetch_fomc_calendar.py's
#                           docstring for why this one's different.
# github.event.schedule tells each job which cron fired so they don't
# all run on every tick; workflow_dispatch runs all three for manual testing.

on:
  schedule:
    - cron: "30 22 * * 1-5"  # weekdays 22:30 UTC
    - cron: "15 21 * * 1"    # Mondays 21:15 UTC (weekly)
    - cron: "0 14 5 1 *"     # January 5, 14:00 UTC (annual)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  layer6-batch:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 22 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas
      - name: Run Layer 6 batch
        run: python scripts/run_layer6_scan.py
      - name: Commit digest if changed
        run: |
          git config user.name "rotation-radar-bot"
          git config user.email "actions@github.com"
          git add data/layer6_digest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update Layer 6 digest"
            git pull --rebase
            git push
          fi

  deployment-ladder:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 21 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas
      - name: Run deployment ladder
        run: python scripts/deployment_ladder.py > /tmp/deployment_ladder_latest.json
      - name: Update committed digest
        run: |
          mkdir -p data
          cp /tmp/deployment_ladder_latest.json data/deployment_ladder_digest.json
      - name: Commit digest if changed
        run: |
          git config user.name "rotation-radar-bot"
          git config user.email "actions@github.com"
          git add data/deployment_ladder_digest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update deployment ladder digest"
            git pull --rebase
            git push
          fi

  fomc-calendar-refresh:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 5 1 *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh FOMC calendar
        run: python scripts/fetch_fomc_calendar.py
      - name: Commit config if changed
        run: |
          git config user.name "rotation-radar-bot"
          git config user.email "actions@github.com"
          git add scripts/deployment_ladder_config.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Refresh FOMC calendar dates"
            git pull --rebase
            git push
          fi
