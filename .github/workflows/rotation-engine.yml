name: Rotation Engine

on:
  schedule:
    - cron: "50 21 * * 1-5"   # weekdays 21:50 UTC, after US close
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas
      - name: Run rotation engine
        run: python scripts/rotation_engine.py
      - name: Commit dataset if changed
        run: |
          git config user.name "rotation-radar-bot"
          git config user.email "actions@github.com"
          git add data/rotation_digest.json
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "Update rotation dataset" && git push)
