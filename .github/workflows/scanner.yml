name: Daily Scanner

on:
  schedule:
    - cron: "25 22 * * 1-5"   # weekdays 22:25 UTC — after Forecast Engine's 22:00 batch
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas numpy
      - name: Run scanner
        env:
          APP_PASSPHRASE: ${{ secrets.APP_PASSPHRASE }}
        run: python scripts/scanner.py
      - name: Commit digest if changed
        run: |
          git config user.name "rotation-radar-bot"
          git config user.email "actions@github.com"
          git add data/scanner_digest.json
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "Update scanner digest" && git push)
