<title>Evidence Engine — Macro App</title>
<style>
  :root{--bg:#F5F5F7;--card:#FFF;--line:rgba(0,0,0,.08);--text:#1D1D1F;--dim:#6E6E73;--blue:#0071E3;--radius:18px}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--text);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    padding:calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 40px);
    max-width:760px;margin:0 auto;-webkit-font-smoothing:antialiased}
  .back{font-size:13px;font-weight:600;color:var(--blue);text-decoration:none}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:8px}
  h1{font-size:30px;font-weight:700;letter-spacing:-.02em;margin:2px 0 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card p{color:var(--dim);font-size:13.5px}
</style>
</head>
