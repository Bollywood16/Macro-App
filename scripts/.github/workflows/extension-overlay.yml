name: Extension Overlay Study

on:
  schedule:
    - cron: "30 21 * * 1-5"   # weekdays 21:30 UTC, after US close
  workflow_dispatch: {}        # manual run from the Actions tab

permissions:
  contents: write

jobs:
  run-study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run extension overlay study
        run: python scripts/extension_overlay.py

      - name: Commit dataset if changed
        run: |
          git config user.name "rotation-radar-bot"
          git config user.email "actions@github.com"
          git add data/extension_overlay.json
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "Update extension overlay dataset" && git push)
